services:
  deck-lotus:
    build:
      context: .
      dockerfile: Dockerfile
    image: deck-lotus:latest
    container_name: deck-lotus
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/deck-lotus.db

      # ── Security (REQUIRED — change JWT_SECRET before deploying!) ──────────
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-long-random-secret}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d

      # ── Admin user (created on first startup if no admin exists) ───────────
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}

      # ── Mana Pool API (required for price monitoring & cart optimizer) ─────
      # Generate your token at: https://manapool.com/seller/settings/integrations
      # Both your account email and API token are required.
      - MANAPOOL_USER_EMAIL=
      - MANAPOOL_API_TOKEN=

      # ── TCGPlayer API (optional fallback — keys no longer publicly issued) ──
      - TCGPLAYER_CLIENT_ID=${TCGPLAYER_CLIENT_ID:-}
      - TCGPLAYER_CLIENT_SECRET=${TCGPLAYER_CLIENT_SECRET:-}

      # ── ntfy push notifications (optional — for price alert notifications) ──
      # Sign up free at https://ntfy.sh or self-host. Set a unique topic name.
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-}

      # ── Price check schedule (cron — default: every 6 hours) ───────────────
      - PRICE_CHECK_SCHEDULE=${PRICE_CHECK_SCHEDULE:-0 */6 * * *}

      # ── Data import (set to 'true' to force a full card data reimport) ──────
      # User decks are preserved via UUIDs during reimport.
      - FORCE_REIMPORT=${FORCE_REIMPORT:-false}

    volumes:
      - deck-lotus-data:/app/data

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

volumes:
  deck-lotus-data:
    driver: local
